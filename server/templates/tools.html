<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N. I. N. A Editor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='29') }}">
</head>
<body>
  <div class="hud-noise" aria-hidden="true"></div>
  <div id="navbar-root"></div>

  <main class="hud-shell tools-page">
    <section class="terminal-panel">
      <section id="editor-workspace" class="workspace-panel active" aria-label="Editor de herramientas">
        <div class="tool-editor-grid">
          <section class="code-panel" aria-label="Editor de herramienta">
            <nav class="editor-menubar" aria-label="Menú del editor">
              <details class="editor-menu">
                <summary>File</summary>
                <div class="editor-menu-list">
                  <button id="save-tool" type="button">Guardar</button>
                  <button id="export-tool" type="button">Exportar HTML</button>
                </div>
              </details>

              <details class="editor-menu">
                <summary>Edit</summary>
                <div class="editor-menu-list">
                  <button type="button" disabled>Deshacer</button>
                  <button type="button" disabled>Rehacer</button>
                </div>
              </details>

              <details class="editor-menu tools-menu">
                <summary>Tools</summary>
                <div class="editor-menu-list tool-menu-list">
                  <button id="new-tool" type="button">Nueva</button>
                  <div id="tool-list" class="tool-list"></div>
                </div>
              </details>
            </nav>

            <div class="editor-header">
              <label>
                <span>Nombre</span>
                <input id="tool-title" type="text" placeholder="Mi herramienta">
              </label>
            </div>

            <div class="code-tabs" role="tablist" aria-label="Código de herramienta">
              <button class="code-tab active" data-code-tab="html" type="button">HTML</button>
              <button class="code-tab" data-code-tab="css" type="button">CSS</button>
              <button class="code-tab" data-code-tab="js" type="button">JS</button>
            </div>

            <textarea id="code-html" class="code-editor active" spellcheck="false"></textarea>
            <textarea id="code-css" class="code-editor" spellcheck="false"></textarea>
            <textarea id="code-js" class="code-editor" spellcheck="false"></textarea>
          </section>

          <aside class="tool-sidebar">
            <div class="panel-heading">
              <p>VARIABLES</p>
              <small>Insertar snippets</small>
            </div>
            <div id="variable-list" class="variable-list"></div>
          </aside>
        </div>
      </section>

      <section id="tool-workspace" class="workspace-panel" aria-label="Herramienta renderizada">
        <div class="tool-run-header">
          <div>
            <p>TOOL</p>
            <h1 id="active-tool-title">Selecciona una herramienta</h1>
          </div>
        </div>

        <div id="tools-runtime" class="tools-runtime single-tool"></div>
      </section>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/navbar.js', v='7') }}"></script>
  <script src="{{ url_for('static', filename='js/tools.js', v='9') }}"></script>
</body>
</html>
