<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>N. I. N. A</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='13') }}">
</head>
<body>
  <div class="hud-noise" aria-hidden="true"></div>
  <div id="navbar-root"></div>

  <main class="hud-shell">
    <section class="terminal-panel">
      <div class="terminal-grid">
        <aside class="side-module">
          <p>LOCAL CORE</p>
          <strong>Scopes</strong>
          <small>Dynamic state generated from <code>state.json</code>.</small>
        </aside>

        <section id="scope-root" class="scope-stack" aria-label="Scopes del sistema"></section>
      </div>
    </section>

    <footer class="dock-panel">
      <div class="dock-icons" aria-hidden="true">
        <span>HOME</span>
        <span>CORE</span>
        <span>LINK</span>
        <span>MAIL</span>
      </div>
      <div class="connection-copy">
        <p id="connection">Conectando con el servidor...</p>
        <p id="client-identity"></p>
      </div>
    </footer>
  </main>

  <script src="{{ url_for('static', filename='js/navbar.js', v='3') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js', v='12') }}"></script>
</body>
</html>
